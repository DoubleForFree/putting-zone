<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Putting Zone">
<title>Putting Zone Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
:root {
  --green-dark: #1a3a2a;
  --green-mid: #2d6a4f;
  --green-bright: #40916c;
  --sand: #f4d35e;
  --flag: #e63946;
  --text: #1a1a1a;
  --muted: #6b7280;
  --card-bg: #f0f7f4;
  --border: #d1fae5;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: var(--green-dark); color: var(--text); }
.screen { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

/* ===== HOME ===== */
#home {
  background: linear-gradient(170deg, #0d2118 0%, #1a3a2a 50%, #2d6a4f 100%);
  align-items: center; justify-content: center;
  padding: 60px 32px 40px; gap: 0; position: relative; overflow: hidden;
}
.home-bg-circle { position: absolute; border-radius: 50%; background: rgba(82,183,136,0.07); }
.home-bg-circle:nth-child(1) { width: 500px; height: 500px; top: -200px; right: -150px; }
.home-bg-circle:nth-child(2) { width: 300px; height: 300px; bottom: -100px; left: -100px; }
.home-flag { font-size: 60px; display: block; margin-bottom: 12px; animation: flagWave 2s ease-in-out infinite; }
@keyframes flagWave { 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg);} }
.home-title { font-family:'Bebas Neue',cursive; font-size:52px; color:white; line-height:0.9; letter-spacing:2px; text-align:center; text-shadow:0 4px 20px rgba(0,0,0,0.4); position:relative;z-index:1; }
.home-title span { color:var(--sand); }
.home-subtitle { color:rgba(255,255,255,0.45); font-size:12px; letter-spacing:3px; text-transform:uppercase; margin-top:6px; margin-bottom:44px; position:relative;z-index:1; }
.home-actions { display:flex; flex-direction:column; gap:10px; width:100%; max-width:300px; position:relative;z-index:1; }
.btn-main { background:var(--sand); color:var(--green-dark); border:none; border-radius:14px; padding:17px; font-family:'Bebas Neue',cursive; font-size:21px; letter-spacing:1px; cursor:pointer; box-shadow:0 6px 24px rgba(244,211,94,0.35); transition:transform 0.1s; width:100%; }
.btn-main:active { transform:scale(0.97); }
.btn-outline { background:rgba(255,255,255,0.1); color:white; border:1.5px solid rgba(255,255,255,0.2); border-radius:14px; padding:15px; font-size:15px; font-weight:600; cursor:pointer; width:100%; }
.btn-outline:active { background:rgba(255,255,255,0.18); }
.home-course-info { position:relative;z-index:1; margin-top:36px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:14px 20px; text-align:center; width:100%;max-width:300px; }
.home-course-info .course-name { font-family:'Bebas Neue',cursive; color:var(--sand); font-size:17px; letter-spacing:1px; }
.home-course-info .course-detail { color:rgba(255,255,255,0.45); font-size:11px; margin-top:2px; }

/* ===== NAV ===== */
.nav-header { background:var(--green-dark); padding:calc(var(--safe-top) + 6px) 16px 14px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.nav-back { background:rgba(255,255,255,0.12); border:none; color:white; width:34px;height:34px; border-radius:10px; font-size:20px; cursor:pointer; display:flex;align-items:center;justify-content:center; flex-shrink:0; }
.nav-title { font-family:'Bebas Neue',cursive; color:white; font-size:22px; letter-spacing:1px; flex:1; }

/* ===== SETUP ===== */
#setup { background:var(--card-bg); }
.setup-body { padding:20px; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.setup-section { margin-bottom:24px; }
.setup-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:9px; }
.profile-grid { display:flex; flex-direction:column; gap:8px; }
.profile-select-card { display:flex; align-items:center; gap:12px; background:white; border:2px solid var(--border); border-radius:14px; padding:10px 14px; cursor:pointer; transition:all 0.15s; }
.profile-select-card.selected { border-color:var(--green-bright); background:#f0fdf4; }
.profile-select-card.selected .profile-check { opacity:1; }
.profile-avatar { width:38px; height:38px; border-radius:50%; color:white; font-weight:700; font-size:14px; display:flex;align-items:center;justify-content:center; flex-shrink:0; font-family:'Bebas Neue',cursive; letter-spacing:1px; }
.profile-info { flex:1; }
.profile-name { font-size:15px; font-weight:700; color:var(--text); }
.profile-stats-hint { font-size:11px; color:var(--muted); margin-top:1px; }
.profile-check { width:22px;height:22px; border-radius:50%; background:var(--green-bright); display:flex;align-items:center;justify-content:center; opacity:0; transition:opacity 0.15s; flex-shrink:0; }
.profile-check::after { content:'✓'; color:white; font-size:13px; font-weight:700; }
.btn-add-profile { background:none; border:1.5px dashed var(--border); border-radius:12px; padding:13px; color:var(--green-bright); font-size:14px; font-weight:600; cursor:pointer; width:100%; display:flex;align-items:center;justify-content:center;gap:6px; margin-top:4px; }
.add-profile-form { background:white; border:2px solid var(--green-bright); border-radius:14px; padding:14px; margin-top:4px; }
.add-profile-form input { width:100%; border:1.5px solid var(--border); border-radius:10px; padding:10px 14px; font-size:16px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; margin-bottom:10px; }
.add-profile-form input:focus { border-color:var(--green-bright); }
.add-profile-actions { display:flex; gap:8px; }
.btn-save-profile { flex:1; background:var(--green-mid); color:white; border:none; border-radius:10px; padding:11px; font-size:14px; font-weight:700; cursor:pointer; }
.btn-cancel-profile { flex:1; background:#f3f4f6; color:var(--muted); border:none; border-radius:10px; padding:11px; font-size:14px; font-weight:600; cursor:pointer; }
.color-picker-row { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
.color-swatch { width:32px; height:32px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:all 0.15s; flex-shrink:0; }
.color-swatch.selected { border-color:white; box-shadow:0 0 0 2px var(--green-bright); transform:scale(1.1); }
.color-picker-label { font-size:11px; color:var(--muted); font-weight:600; margin-bottom:5px; }
.start-hole-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
.start-hole-btn { border:1.5px solid var(--border); border-radius:10px; padding:10px 4px; text-align:center; cursor:pointer; background:white; font-size:13px; font-weight:700; color:var(--text); transition:all 0.15s; }
.start-hole-btn.selected { border-color:var(--green-bright); background:#f0fdf4; color:var(--green-dark); }
.start-hole-btn .hole-par-hint { font-size:9px; color:var(--muted); font-weight:400; }
.btn-start { background:var(--green-mid); color:white; border:none; border-radius:14px; padding:17px; font-family:'Bebas Neue',cursive; font-size:21px; letter-spacing:1px; cursor:pointer; width:100%; margin-top:6px; box-shadow:0 4px 16px rgba(45,106,79,0.3); }
.btn-start:active { transform:scale(0.98); }

/* ===== SCORING SCREEN ===== */
#scoring { background:var(--card-bg); }
.score-header { background:var(--green-dark); padding:calc(var(--safe-top) + 4px) 10px 8px; flex-shrink:0; }
.hole-nav-row { display:flex; align-items:center; margin-bottom:8px; position:relative; min-height:40px; }
.hole-center { position:absolute; left:0; right:0; text-align:center; pointer-events:none; }
.hole-arrow { background:rgba(255,255,255,0.12); border:none; color:white; width:32px; height:32px; border-radius:10px; font-size:18px; cursor:pointer; display:flex;align-items:center;justify-content:center; flex-shrink:0; transition:background 0.1s; }
.hole-arrow:active { background:rgba(255,255,255,0.22); }
.hole-exit-btn { background:rgba(230,57,70,0.2); border:1px solid rgba(230,57,70,0.4); color:rgba(255,255,255,0.7); width:32px; height:32px; border-radius:10px; font-size:13px; cursor:pointer; display:flex;align-items:center;justify-content:center; flex-shrink:0; font-weight:700; }
.hole-exit-btn:active { background:rgba(230,57,70,0.4); }
.hole-badge { display:inline-block; background:var(--sand); color:var(--green-dark); font-family:'Bebas Neue',cursive; font-size:11px; letter-spacing:1px; padding:2px 9px; border-radius:20px; margin-bottom:1px; }
.hole-name-header { font-family:'Bebas Neue',cursive; color:white; font-size:22px; letter-spacing:1px; line-height:1; }
.hole-par-badge { color:rgba(255,255,255,0.55); font-size:12px; font-weight:600; margin-top:1px; }
.hole-strip-wrap { overflow-x:auto; scrollbar-width:none; padding:0 2px 2px; }
.hole-strip-wrap::-webkit-scrollbar { display:none; }
.hole-strip { display:flex; gap:5px; width:max-content; }
.hole-pip { display:flex; flex-direction:column; align-items:center; justify-content:center; width:34px; min-height:42px; border-radius:9px; border:1.5px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.07); cursor:pointer; transition:all 0.12s; flex-shrink:0; padding:4px 2px; }
.hole-pip.current { background:white; border-color:white; }
.hole-pip.scored { background:rgba(64,145,108,0.5); border-color:var(--green-bright); }
.hole-pip.current.scored { background:var(--sand); border-color:var(--sand); }
.hole-pip-num { font-family:'Bebas Neue',cursive; font-size:14px; color:rgba(255,255,255,0.8); line-height:1; }
.hole-pip.current .hole-pip-num { color:var(--green-dark); }
.hole-pip.scored .hole-pip-num { color:white; }
.hole-pip.current.scored .hole-pip-num { color:var(--green-dark); }
.hole-pip-check { font-size:8px; color:rgba(255,255,255,0.5); margin-top:1px; line-height:1; }
.hole-pip.scored .hole-pip-check { color:rgba(255,255,255,0.9); }
.hole-pip.current .hole-pip-check { color:var(--green-dark); opacity:0.6; }
.hole-pip.current.scored .hole-pip-check { color:var(--green-dark); opacity:0.7; }
.player-switcher { display:flex; gap:6px; padding:0 10px 8px; overflow-x:auto; scrollbar-width:none; flex-shrink:0; background:var(--green-dark); }
.player-switcher::-webkit-scrollbar { display:none; }
.player-chip { flex-shrink:0; display:flex; align-items:center; gap:7px; padding:5px 12px 5px 6px; border-radius:20px; border:none; cursor:pointer; background:rgba(255,255,255,0.1); transition:all 0.15s; }
.player-chip.active { background:white; }
.player-chip-avatar { width:24px;height:24px; border-radius:50%; color:white; font-weight:800; font-size:10px; display:flex;align-items:center;justify-content:center; flex-shrink:0; font-family:'Bebas Neue',cursive; }
.player-chip-name { font-size:12px; font-weight:600; color:rgba(255,255,255,0.75); }
.player-chip.active .player-chip-name { color:var(--green-dark); }
.player-chip-score { font-size:11px; font-weight:700; color:rgba(255,255,255,0.45); margin-left:1px; }
.player-chip.active .player-chip-score { color:var(--green-mid); }
.score-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px 14px; display:flex; flex-direction:column; gap:11px; }
.hole-stats-card { background:white; border-radius:14px; padding:12px 14px; box-shadow:0 1px 6px rgba(0,0,0,0.06); }
.hole-stats-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:8px; }
.hole-stats-row { display:flex; gap:6px; }
.hole-stat { flex:1; text-align:center; background:var(--card-bg); border-radius:10px; padding:7px 4px; }
.hole-stat-val { font-family:'Bebas Neue',cursive; font-size:20px; color:var(--green-dark); line-height:1; }
.hole-stat-val.under { color:#16a34a; }
.hole-stat-val.over { color:var(--flag); }
.hole-stat-lbl { font-size:9px; color:var(--muted); margin-top:1px; }
.score-inputs-card { background:white; border-radius:14px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.06); }
.score-section-header { padding:8px 14px 5px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); background:#fafafa; border-bottom:1px solid #f0f0f0; }
.stroke-stepper-wrap { display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid #f5f5f5; }
.stroke-stepper-label { flex:1; }
.stroke-stepper-label-text { font-size:14px; font-weight:600; color:var(--text); }
.stroke-stepper-label-sub { font-size:11px; color:var(--muted); margin-top:1px; }
.stroke-stepper { display:flex; align-items:center; background:#f0fdf4; border:2px solid var(--border); border-radius:14px; overflow:hidden; }
.stroke-step-btn { background:none; border:none; width:44px; height:44px; font-size:22px; cursor:pointer; color:var(--green-mid); font-weight:700; display:flex;align-items:center;justify-content:center; flex-shrink:0; }
.stroke-step-btn:active { background:#d1fae5; }
.stroke-step-val { font-family:'Bebas Neue',cursive; font-size:30px; color:var(--green-dark); min-width:44px; text-align:center; line-height:1; }
.input-row { display:flex; align-items:center; gap:12px; padding:11px 14px; border-bottom:1px solid #f5f5f5; }
.input-row-label { flex:1; }
.input-row-label-text { font-size:14px; font-weight:600; color:var(--text); }
.input-row-sub { font-size:11px; color:var(--muted); margin-top:1px; }
.input-stepper { display:flex; align-items:center; gap:0; background:#f3f4f6; border-radius:12px; overflow:hidden; }
.stepper-btn { background:none; border:none; width:36px; height:36px; font-size:20px; cursor:pointer; color:var(--green-mid); font-weight:700; display:flex;align-items:center;justify-content:center; }
.stepper-btn:active { background:#e5e7eb; }
.stepper-val { min-width:38px; text-align:center; font-size:17px; font-weight:700; color:var(--text); }
.zones-wrap { padding:10px 14px; border-bottom:1px solid #f5f5f5; }
.zones-grid { display:flex; gap:7px; flex-wrap:wrap; margin-top:7px; }
.zone-chip { display:flex;align-items:center;gap:5px; padding:8px 12px; border-radius:20px; border:1.5px solid var(--border); background:white; cursor:pointer; font-size:13px; font-weight:600; color:var(--muted); transition:all 0.15s; }
.zone-chip.hit { border-color:var(--green-bright); background:#f0fdf4; color:var(--green-dark); }
.zone-chip-dot { width:7px;height:7px;border-radius:50%; background:var(--border); transition:background 0.15s; }
.zone-chip.hit .zone-chip-dot { background:var(--green-bright); }
.score-summary-bar { background:var(--green-dark); border-radius:14px; padding:14px 16px; display:flex; align-items:stretch; justify-content:space-between; gap:12px; box-shadow:0 2px 12px rgba(0,0,0,0.15); }
.summary-left { flex:1; display:flex; flex-direction:column; justify-content:center; }
.summary-left .lbl { color:rgba(255,255,255,0.5); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.summary-left .big-val { font-family:'Bebas Neue',cursive; font-size:52px; color:white; line-height:1; }
.summary-left .player-name-lbl { color:rgba(255,255,255,0.45); font-size:11px; font-weight:600; margin-top:2px; }
.vs-par.under { color:#4ade80; }
.vs-par.over { color:#f87171; }
.vs-par.even { color:rgba(255,255,255,0.5); }
.summary-divider { width:1px; background:rgba(255,255,255,0.12); flex-shrink:0; }
.summary-right { display:flex; flex-direction:column; justify-content:center; gap:6px; min-width:110px; }
.summary-right-row { display:flex; flex-direction:column; align-items:flex-end; }
.summary-right .sr-lbl { color:rgba(255,255,255,0.4); font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; }
.summary-right .sr-val { font-family:'Bebas Neue',cursive; font-size:20px; color:white; line-height:1; }
.summary-right .sr-val.under { color:#4ade80; }
.summary-right .sr-val.over { color:#f87171; }
.summary-right-divider { height:1px; background:rgba(255,255,255,0.1); }
.score-footer { padding:10px 14px calc(var(--safe-bottom) + 10px); background:var(--card-bg); border-top:1px solid #e0ede8; flex-shrink:0; }
.btn-next-hole { background:var(--green-mid); color:white; border:none; border-radius:14px; padding:15px; font-family:'Bebas Neue',cursive; font-size:21px; letter-spacing:1px; cursor:pointer; width:100%; box-shadow:0 3px 12px rgba(45,106,79,0.3); transition:transform 0.1s; }
.btn-next-hole:active { transform:scale(0.98); }
.btn-next-hole.finish { background:var(--flag); box-shadow:0 3px 12px rgba(230,57,70,0.3); }

/* ===== SCORECARDS (history list) ===== */
#scorecard { background:var(--card-bg); }
.scorecard-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; }
.section-label { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px; }
.round-history-card { background:white; border-radius:14px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.07); margin-bottom:12px; cursor:pointer; transition:box-shadow 0.15s; }
.round-history-card:active { box-shadow:0 2px 12px rgba(0,0,0,0.14); }
.rh-header { background:var(--green-dark); padding:10px 14px; display:flex; align-items:center; justify-content:space-between; }
.rh-date { font-family:'Bebas Neue',cursive; color:var(--sand); font-size:15px; letter-spacing:1px; }
.rh-time { color:rgba(255,255,255,0.45); font-size:11px; }
.rh-players { padding:10px 14px; display:flex; flex-direction:column; gap:7px; }
.rh-player-row { display:flex; align-items:center; gap:9px; }
.rh-avatar { width:26px;height:26px;border-radius:50%;color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Bebas Neue',cursive; }
.rh-name { flex:1; font-size:13px; font-weight:600; color:var(--text); }
.rh-score { font-family:'Bebas Neue',cursive; font-size:18px; }
.rh-net { font-size:11px; color:var(--muted); }
.rh-arrow { color:#d1d5db; font-size:18px; padding-left:4px; }
.round-detail-back { display:flex; align-items:center; gap:8px; padding:0 0 12px; cursor:pointer; }
.round-detail-back-btn { background:rgba(255,255,255,0.12); border:none; color:var(--green-dark); width:30px;height:30px; border-radius:8px; font-size:18px; cursor:pointer; display:flex;align-items:center;justify-content:center; }
.round-detail-back-lbl { font-size:13px; font-weight:600; color:var(--green-mid); }

/* ===== EDIT ROUND BUTTON (in round detail header row) ===== */
/* NEW: sits alongside the back button in the detail view header row */
.edit-round-btn {
  margin-left:auto;
  background: rgba(244,211,94,0.15);
  border: 1.5px solid rgba(244,211,94,0.4);
  color: var(--sand);
  border-radius: 10px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  letter-spacing: 0.3px;
  transition: background 0.15s;
}
.edit-round-btn:active { background: rgba(244,211,94,0.28); }

/* Scorecard table shared styles */
.sc-wrap { border-radius:14px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.08); margin-bottom:14px; overflow-x:auto; background:white; }
.sc-table { border-collapse:collapse; font-size:11px; min-width:100%; }
.sc-table th { background:var(--green-dark); color:rgba(255,255,255,0.65); padding:7px 8px; text-align:center; font-size:10px; font-weight:600; white-space:nowrap; }
.sc-table th.sticky-col { position:sticky; left:0; z-index:2; background:var(--green-dark); color:var(--sand); min-width:78px; text-align:left; padding-left:10px; }
.sc-table td { padding:6px 8px; text-align:center; border-bottom:1px solid #f0f0f0; white-space:nowrap; }
.sc-table td.sticky-col { position:sticky; left:0; background:white; font-weight:700; font-size:10px; text-align:left; padding-left:10px; color:var(--muted); z-index:1; border-right:1px solid #e5e7eb; }
.sc-table tr.group-header td { background:#f8f9fa; font-family:'Bebas Neue',cursive; font-size:10px; letter-spacing:1px; color:var(--muted); padding:4px 8px 4px 10px; border-top:2px solid #e5e7eb; }
.sc-table tr.group-header td.sticky-col { background:#f8f9fa; }
.sc-table tr.subtotal-row td { background:#f0fdf4; font-weight:700; border-top:1.5px solid var(--border); }
.sc-table tr.subtotal-row td.sticky-col { background:#f0fdf4; }
.sc-table tr.grand-total-row td { background:var(--green-dark); color:white; font-weight:700; border-top:2px solid var(--green-bright); font-family:'Bebas Neue',cursive; font-size:13px; }
.sc-table tr.grand-total-row td.sticky-col { background:var(--green-dark); color:var(--sand); }
.sc-net-under { color:#16a34a; font-weight:700; }
.sc-net-over { color:var(--flag); font-weight:700; }
.sc-pen-val { color:var(--muted); font-size:10px; }
.penalties-card { background:white; border-radius:14px; padding:14px; box-shadow:0 1px 6px rgba(0,0,0,0.07); margin-bottom:14px; }
.penalties-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:10px; }
.penalties-row { display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid #f3f4f6; }
.penalties-row:last-child { border-bottom:none; }
.pen-avatar { width:26px;height:26px;border-radius:50%;color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Bebas Neue',cursive; }
.pen-name { flex:1; font-size:13px; font-weight:600; }
.pen-val { font-family:'Bebas Neue',cursive; font-size:20px; color:var(--green-dark); }

/* ===== PROFILES ===== */
#profiles { background:var(--card-bg); }
.profiles-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; }
.profile-detail-card { background:white; border-radius:14px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,0.07); margin-bottom:14px; }
.profile-detail-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.profile-detail-avatar { width:48px;height:48px;border-radius:50%;color:white;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center; font-family:'Bebas Neue',cursive; }
.profile-detail-name { font-size:18px; font-weight:700; }
.profile-detail-rounds { font-size:12px; color:var(--muted); }
.profile-stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.profile-stat-box { background:var(--card-bg); border-radius:10px; padding:9px 6px; text-align:center; }
.profile-stat-box .val { font-family:'Bebas Neue',cursive; font-size:22px; color:var(--green-dark); }
.profile-stat-box .val.small { font-size:16px; }
.profile-stat-box .lbl { font-size:9px; color:var(--muted); margin-top:1px; }
.profile-stat-section-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:12px 0 6px; }

/* ===== SUMMARY ===== */
#summary { background:var(--card-bg); }
.summary-hero { background:linear-gradient(160deg, var(--green-dark), var(--green-mid)); padding:calc(var(--safe-top) + 12px) 20px 18px; flex-shrink:0; }
.summary-hero-top { display:flex; align-items:center; gap:10px; }
.summary-trophy { font-size:36px; }
.summary-title { font-family:'Bebas Neue',cursive; font-size:28px; color:white; letter-spacing:2px; }
.summary-date { color:rgba(255,255,255,0.45); font-size:12px; margin-top:2px; }
.summary-winner-bar { margin-top:14px; background:rgba(255,255,255,0.1); border-radius:12px; padding:12px 16px; display:flex; align-items:center; gap:10px; }
.sw-trophy { font-size:22px; }
.sw-info { flex:1; }
.sw-label { color:rgba(255,255,255,0.5); font-size:9px; text-transform:uppercase; letter-spacing:2px; }
.sw-name { font-family:'Bebas Neue',cursive; font-size:22px; color:var(--sand); line-height:1.1; }
.sw-detail { color:rgba(255,255,255,0.7); font-size:12px; font-weight:600; }
.summary-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px; }
.btn-new-round { background:var(--sand); color:var(--green-dark); border:none; border-radius:14px; padding:16px; font-family:'Bebas Neue',cursive; font-size:21px; letter-spacing:1px; cursor:pointer; width:100%; margin-top:6px; }

/* ===== EDIT ROUND SCREEN ===== */
#edit-round { background: var(--card-bg); }

/* Edit screen footer — save + delete stacked */
.edit-screen-footer {
  padding: 10px 14px calc(var(--safe-bottom) + 10px);
  background: var(--card-bg);
  border-top: 1px solid #e0ede8;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.btn-save-changes {
  background: var(--green-mid); color: white; border: none; border-radius: 14px;
  padding: 15px; font-family: 'Bebas Neue', cursive; font-size: 21px; letter-spacing: 1px;
  cursor: pointer; width: 100%; box-shadow: 0 3px 12px rgba(45,106,79,0.3); transition: transform 0.1s;
}
.btn-save-changes:active { transform: scale(0.98); }
.btn-delete-round {
  background: rgba(230,57,70,0.08); border: 1.5px solid rgba(230,57,70,0.3); color: var(--flag);
  border-radius: 14px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer;
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s;
}
.btn-delete-round:active { background: rgba(230,57,70,0.16); }

/* Edit scorecard table wrapper */
.edit-sc-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; }
.edit-info-banner {
  background: linear-gradient(90deg, rgba(244,211,94,0.18), rgba(244,211,94,0.08));
  border: 1.5px solid rgba(244,211,94,0.35); border-radius: 12px;
  padding: 9px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.edit-info-banner-text { font-size: 12px; font-weight: 600; color: var(--green-dark); line-height: 1.4; }
.edit-info-banner-text span { color: var(--green-mid); }

/* Editable cell highlight in edit scorecard */
.edit-cell { cursor: pointer; transition: background 0.1s; }
.edit-cell:active { background: #fef9c3 !important; }
.edit-cell.active-cell { background: #fef9c3 !important; outline: 2px solid var(--sand); outline-offset: -2px; }

/* Player expand row */
.edit-player-header { cursor: pointer; }
.edit-player-header:active td { background: #f0fdf4 !important; }
.expand-arrow { float: right; margin-right: 6px; font-size: 11px; transition: transform 0.2s; display: inline-block; }
.expand-arrow.open { transform: rotate(180deg); }

/* Expanded per-player hole list */
.edit-hole-list-row td { padding: 0; }
.edit-hole-list { background: #f8fffe; }
.ehl-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid #f0f0f0; }
.ehl-hole-num { font-family: 'Bebas Neue', cursive; font-size: 17px; color: var(--green-dark); min-width: 26px; }
.ehl-hole-name { flex: 1; font-size: 11px; color: var(--muted); line-height: 1.3; }
.ehl-chips { display: flex; gap: 6px; align-items: center; }
.ehl-chip { background: white; border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 10px; cursor: pointer; text-align: center; transition: all 0.12s; }
.ehl-chip:active, .ehl-chip.active-chip { background: #fef9c3; border-color: var(--sand); }
.ehl-chip-val { font-family: 'Bebas Neue', cursive; font-size: 16px; color: var(--green-dark); line-height: 1; }
.ehl-chip-lbl { font-size: 8px; color: var(--muted); margin-top: 1px; }
.ehl-net { text-align: center; min-width: 28px; }
.ehl-net-val { font-family: 'Bebas Neue', cursive; font-size: 16px; }

/* Bottom sheet */
.bs-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300;
  align-items: flex-end; justify-content: center;
}
.bs-overlay.show { display: flex; }
.bs-box {
  background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
  padding: 0 0 calc(var(--safe-bottom) + 14px);
  animation: bsSlideUp 0.22s ease-out;
}
@keyframes bsSlideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.bs-handle { width: 36px; height: 4px; background: #e5e7eb; border-radius: 2px; margin: 10px auto 14px; }
.bs-header { padding: 0 18px 12px; border-bottom: 1px solid #f0f0f0; }
.bs-title { font-family: 'Bebas Neue', cursive; font-size: 20px; color: var(--green-dark); letter-spacing: 1px; }
.bs-subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }
.bs-body { padding: 16px 18px 4px; }
.bs-field-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
.bs-stroke-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.bs-stepper { display: flex; align-items: center; background: #f0fdf4; border: 2px solid var(--border); border-radius: 14px; overflow: hidden; }
.bs-step-btn { background: none; border: none; width: 52px; height: 52px; font-size: 26px; cursor: pointer; color: var(--green-mid); font-weight: 700; display: flex; align-items: center; justify-content: center; }
.bs-step-btn:active { background: #d1fae5; }
.bs-step-val { font-family: 'Bebas Neue', cursive; font-size: 36px; color: var(--green-dark); min-width: 52px; text-align: center; line-height: 1; }
.bs-zones-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.bs-zone-chip { display: flex; align-items: center; gap: 5px; padding: 10px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); transition: all 0.15s; }
.bs-zone-chip.hit { border-color: var(--green-bright); background: #f0fdf4; color: var(--green-dark); }
.bs-zone-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.bs-zone-chip.hit .bs-zone-dot { background: var(--green-bright); }
.bs-pen-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.bs-pen-stepper { display: flex; align-items: center; background: #f3f4f6; border-radius: 12px; overflow: hidden; }
.bs-pen-btn { background: none; border: none; width: 44px; height: 44px; font-size: 22px; cursor: pointer; color: var(--green-mid); font-weight: 700; display: flex; align-items: center; justify-content: center; }
.bs-pen-btn:active { background: #e5e7eb; }
.bs-pen-val { min-width: 44px; text-align: center; font-family: 'Bebas Neue', cursive; font-size: 28px; color: var(--text); }
.bs-done-btn { background: var(--green-mid); color: white; border: none; border-radius: 14px; padding: 14px; font-family: 'Bebas Neue', cursive; font-size: 19px; letter-spacing: 1px; cursor: pointer; width: 100%; }
.bs-done-btn:active { opacity: 0.88; }

/* ===== TIE RESOLUTION ===== */
.tie-players-grid { display:flex; flex-direction:column; gap:8px; margin:12px 0; }
.tie-player-btn { display:flex; align-items:center; gap:10px; background:#f8f9fa; border:2px solid var(--border); border-radius:12px; padding:10px 14px; cursor:pointer; width:100%; text-align:left; transition:all 0.15s; }
.tie-player-btn:active { background:#f0fdf4; border-color:var(--green-bright); }
.tie-player-avatar { width:32px; height:32px; border-radius:50%; color:white; font-size:12px; font-weight:700; display:flex;align-items:center;justify-content:center; font-family:'Bebas Neue',cursive; flex-shrink:0; }
.tie-player-name { font-size:14px; font-weight:700; color:var(--text); }
.tie-player-score { font-size:12px; color:var(--muted); }
.tie-btn-declare { background:rgba(255,255,255,0.12); border:1.5px dashed rgba(255,255,255,0.5); border-radius:12px; padding:11px; color:rgba(255,255,255,0.85); font-size:14px; font-weight:600; cursor:pointer; width:100%; text-align:center; margin-top:4px; }
.tie-btn-declare:active { background:rgba(255,255,255,0.2); }

/* ===== MODAL ===== */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300; align-items:center; justify-content:center; padding:24px; }
.modal-overlay.show { display:flex; }
.modal-box { background:white; border-radius:20px; padding:26px 22px; width:100%;max-width:340px; text-align:center; }
.modal-icon { font-size:40px; margin-bottom:10px; }
.modal-title { font-family:'Bebas Neue',cursive; font-size:24px; color:var(--text); margin-bottom:6px; }
.modal-msg { font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:18px; }
.modal-actions { display:flex; gap:8px; flex-wrap:wrap; }
.modal-btn { flex:1;min-width:calc(50% - 4px);padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer; }
.modal-btn.primary { background:var(--green-mid); color:white; }
.modal-btn.danger { background:var(--flag); color:white; }
.modal-btn.cancel { background:#f3f4f6; color:var(--text); }
.modal-btn.warn { background:#f59e0b; color:white; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-bg-circle"></div>
  <div class="home-bg-circle"></div>
  <span class="home-flag">⛳</span>
  <div style="position:relative;z-index:1;text-align:center;">
    <div class="home-title">PUTTING<br><span>ZONE</span></div>
    <div class="home-subtitle">Scorecard</div>
  </div>
  <div class="home-actions">
    <button class="btn-main" onclick="showScreen('setup');initSetup()">NEW ROUND</button>
    <button class="btn-outline" onclick="showScreen('scorecard');renderScorecardList()">VIEW SCORECARDS</button>
    <button class="btn-outline" onclick="showScreen('profiles');renderProfilesScreen()">PLAYER PROFILES</button>
  </div>
  <div class="home-course-info">
    <div class="course-name">THE PUTTING ZONE</div>
    <div class="course-detail">18 Holes · Par 72 · Nashville, TN</div>
  </div>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
  <div class="nav-header">
    <button class="nav-back" onclick="showScreen('home')">‹</button>
    <div class="nav-title">NEW ROUND</div>
  </div>
  <div class="setup-body">
    <div class="setup-section">
      <div class="setup-label">Starting Hole</div>
      <div class="start-hole-grid" id="start-hole-grid"></div>
    </div>
    <div class="setup-section">
      <div class="setup-label">Select Players</div>
      <div class="profile-grid" id="setup-profile-grid"></div>
      <button class="btn-add-profile" onclick="showAddProfileForm()">+ Add New Player</button>
      <div class="add-profile-form" id="add-profile-form" style="display:none;">
        <input type="text" id="new-profile-name" placeholder="Player name" maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="color-picker-label">Pick a color</div>
        <div class="color-picker-row" id="new-profile-color-picker"></div>
        <div class="add-profile-actions">
          <button class="btn-cancel-profile" onclick="hideAddProfileForm()">Cancel</button>
          <button class="btn-save-profile" onclick="saveNewProfile()">Save Player</button>
        </div>
      </div>
    </div>
    <button class="btn-start" onclick="startRound()">START ROUND ›</button>
    <div style="height:20px"></div>
  </div>
</div>

<!-- SCORING -->
<div id="scoring" class="screen">
  <div class="score-header">
    <div class="hole-nav-row">
      <div class="hole-center">
        <div class="hole-badge" id="hole-badge">HOLE 1</div>
        <div class="hole-name-header" id="hole-name-header">Music City Mile</div>
        <div class="hole-par-badge" id="hole-par-badge">Par 5</div>
      </div>
      <button class="hole-exit-btn" style="margin-left:auto" onclick="confirmExitRound()" title="Exit Round">✕</button>
    </div>
    <div class="hole-strip-wrap" id="hole-strip-wrap">
      <div class="hole-strip" id="hole-strip"></div>
    </div>
  </div>
  <div class="player-switcher" id="player-switcher"></div>
  <div class="score-body" id="score-body"></div>
  <div class="score-footer">
    <button class="btn-next-hole" id="btn-next" onclick="saveAndAdvance()">SAVE & NEXT ›</button>
  </div>
</div>

<!-- SCORECARDS -->
<div id="scorecard" class="screen">
  <div class="nav-header">
    <button class="nav-back" onclick="showScreen('home')">‹</button>
    <div class="nav-title" id="scorecard-nav-title">SCORECARDS</div>
  </div>
  <div class="scorecard-body" id="scorecard-body"></div>
</div>

<!-- PROFILES -->
<div id="profiles" class="screen">
  <div class="nav-header">
    <button class="nav-back" onclick="showScreen('home')">‹</button>
    <div class="nav-title">PLAYER PROFILES</div>
  </div>
  <div class="profiles-body" id="profiles-body"></div>
</div>

<!-- SUMMARY -->
<div id="summary" class="screen">
  <div class="summary-hero">
    <div class="summary-hero-top">
      <div class="summary-trophy">🏆</div>
      <div>
        <div class="summary-title">ROUND COMPLETE</div>
        <div class="summary-date" id="summary-date"></div>
      </div>
    </div>
    <div class="summary-winner-bar" id="summary-winner-bar"></div>
  </div>
  <div class="summary-body" id="summary-body"></div>
</div>

<!--
  EDIT ROUND SCREEN (v2.7)
  Scorecard table view — tap player name row to expand all holes,
  tap any chip (strokes/zones/penalties) to open a bottom sheet editor.
-->
<div id="edit-round" class="screen">
  <div class="nav-header">
    <button class="nav-back" onclick="confirmExitEdit()">‹</button>
    <div class="nav-title" id="edit-nav-title">EDIT ROUND</div>
  </div>
  <div class="edit-sc-body" id="edit-sc-body"></div>
  <div class="edit-screen-footer">
    <button class="btn-save-changes" onclick="saveEditedRound()">SAVE CHANGES ✓</button>
    <button class="btn-delete-round" onclick="confirmDeleteRound()">🗑 Delete This Round</button>
  </div>
</div>

<!-- BOTTOM SHEET for cell editing -->
<div class="bs-overlay" id="bs-overlay" onclick="closeBsOverlay(event)">
  <div class="bs-box" id="bs-box">
    <div class="bs-handle"></div>
    <div class="bs-header">
      <div class="bs-title" id="bs-title"></div>
      <div class="bs-subtitle" id="bs-subtitle"></div>
    </div>
    <div class="bs-body" id="bs-body"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon">⛳</div>
    <div class="modal-title" id="modal-title">Confirm</div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
const HOLES = [
  { num:1,  name:"Music City Mile",      par:5, zones:3 },
  { num:2,  name:"The Tennessee Waltz",  par:3, zones:1 },
  { num:3,  name:"Putts In Low Places",  par:4, zones:2 },
  { num:4,  name:"A Hard Day's Putt",    par:4, zones:2 },
  { num:5,  name:"Grand Ole Grind",      par:5, zones:3 },
  { num:6,  name:"Six String Swing",     par:4, zones:2 },
  { num:7,  name:"The Gambler",          par:3, zones:1 },
  { num:8,  name:"Born To Run",          par:4, zones:2 },
  { num:9,  name:"Hound Dog(leg)",       par:4, zones:2 },
  { num:10, name:"The Encore",           par:5, zones:3 },
  { num:11, name:"Staying Alive",        par:4, zones:2 },
  { num:12, name:"The Stage Dive",       par:4, zones:2 },
  { num:13, name:"Jolene's Curve",       par:4, zones:2 },
  { num:14, name:"Legends Row",          par:5, zones:3 },
  { num:15, name:"Stairway To Heaven",   par:4, zones:2 },
  { num:16, name:"Walk The Line",        par:3, zones:1 },
  { num:17, name:"Folsom Fade",          par:3, zones:1 },
  { num:18, name:"Ring Of Fire",         par:4, zones:2 },
];

const PLAYER_COLORS = [
  '#40916c','#e63946','#f4a261','#4361ee','#7209b7',
  '#f4d35e','#e76f51','#2ec4b6','#3a86ff','#ff006e',
  '#8338ec','#fb5607',
];

function getInitials(name) {
  const words = name.trim().split(/\s+/).filter(Boolean);
  if (words.length === 1) return words[0][0].toUpperCase();
  return words.slice(0, 3).map(w => w[0].toUpperCase()).join('');
}

// ===== PROFILES =====
function getProfiles() {
  try { return JSON.parse(localStorage.getItem('pz_profiles') || '[]'); } catch { return []; }
}
function saveProfiles(p) { localStorage.setItem('pz_profiles', JSON.stringify(p)); }
function createProfile(name, colorIdx) {
  const profiles = getProfiles();
  const ci = (colorIdx !== undefined) ? colorIdx : (profiles.length % PLAYER_COLORS.length);
  const profile = { id: Date.now().toString(), name: name.trim(), colorIdx: ci, createdAt: Date.now() };
  profiles.push(profile);
  saveProfiles(profiles);
  return profile;
}
function updateProfileColor(id, colorIdx) {
  const profiles = getProfiles();
  const p = profiles.find(p => p.id === id);
  if (p) { p.colorIdx = colorIdx; saveProfiles(profiles); }
}
function deleteProfile(id) { saveProfiles(getProfiles().filter(p => p.id !== id)); }

// ===== STATE =====
let state = {
  selectedProfileIds: [], startHole: 0, currentHole: 0, currentPlayer: 0,
  scores: [], activePlayers: [], roundStarted: false,
};

/*
 * NEW: editState — mirrors the structure of state but holds a copy of
 * an existing round being edited. Kept separate so live scoring is never affected.
 *   editState.roundIdx      — index in pz_rounds array
 *   editState.currentHole   — which hole is shown (0-based)
 *   editState.currentPlayer — which player tab is active
 *   editState.scores        — deep copy of round.scores, mutated during editing
 *   editState.activePlayers — copy of round.players
 */
let editState = {
  roundIdx: -1,
  currentHole: 0,
  currentPlayer: 0,
  scores: [],
  activePlayers: [],
};

function emptyScore(hole) {
  return { strokes: hole.par, zonesHit: new Array(hole.zones).fill(false), penalties: 0, saved: false };
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== SETUP =====
function initSetup() {
  state.selectedProfileIds = [];
  renderStartHoleGrid();
  renderSetupProfileGrid();
}

function renderStartHoleGrid() {
  document.getElementById('start-hole-grid').innerHTML = HOLES.map((h, i) => `
    <div class="start-hole-btn ${i === state.startHole ? 'selected' : ''}" onclick="selectStartHole(${i})">
      ${h.num}<div class="hole-par-hint">Par ${h.par}</div>
    </div>
  `).join('');
}

function selectStartHole(idx) { state.startHole = idx; renderStartHoleGrid(); }

function renderSetupProfileGrid() {
  const profiles = getProfiles();
  const grid = document.getElementById('setup-profile-grid');
  if (!profiles.length) {
    grid.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:13px;padding:12px 0;">No players yet. Add one below!</div>`;
    return;
  }
  grid.innerHTML = profiles.map(p => {
    const selected = state.selectedProfileIds.includes(p.id);
    const color = PLAYER_COLORS[p.colorIdx];
    const stats = getProfileStats(p.id);
    const hint = stats.rounds > 0 ? `${stats.rounds} round${stats.rounds!==1?'s':''} · Avg ${stats.avgScore}` : 'No rounds yet';
    return `
      <div class="profile-select-card ${selected?'selected':''}" onclick="toggleProfileSelect('${p.id}')">
        <div class="profile-avatar" style="background:${color}">${getInitials(p.name)}</div>
        <div class="profile-info">
          <div class="profile-name">${escHtml(p.name)}</div>
          <div class="profile-stats-hint">${hint}</div>
        </div>
        <div class="profile-check"></div>
      </div>
    `;
  }).join('');
}

function toggleProfileSelect(id) {
  const idx = state.selectedProfileIds.indexOf(id);
  if (idx === -1) { if (state.selectedProfileIds.length >= 5) return; state.selectedProfileIds.push(id); }
  else state.selectedProfileIds.splice(idx, 1);
  renderSetupProfileGrid();
}

let selectedNewColorIdx = 0;

function renderColorPicker(pickerId, selectedIdx, onClickFn) {
  const el = document.getElementById(pickerId);
  if (!el) return;
  el.innerHTML = PLAYER_COLORS.map((c, i) => `
    <div class="color-swatch ${i === selectedIdx ? 'selected' : ''}"
      style="background:${c}"
      onclick="${onClickFn}(${i})">
    </div>
  `).join('');
}

function showAddProfileForm() {
  const profiles = getProfiles();
  selectedNewColorIdx = profiles.length % PLAYER_COLORS.length;
  document.getElementById('add-profile-form').style.display = 'block';
  document.getElementById('new-profile-name').value = '';
  renderColorPicker('new-profile-color-picker', selectedNewColorIdx, 'selectNewColor');
  setTimeout(() => document.getElementById('new-profile-name').focus(), 100);
}

function selectNewColor(idx) {
  selectedNewColorIdx = idx;
  renderColorPicker('new-profile-color-picker', idx, 'selectNewColor');
}

function hideAddProfileForm() { document.getElementById('add-profile-form').style.display = 'none'; }

function saveNewProfile() {
  const name = document.getElementById('new-profile-name').value.trim();
  if (!name) return;
  const profile = createProfile(name, selectedNewColorIdx);
  state.selectedProfileIds.push(profile.id);
  hideAddProfileForm();
  renderSetupProfileGrid();
}

function startRound() {
  if (!state.selectedProfileIds.length) {
    showModal('⛳','Select Players','Please select at least one player to start a round.',[{label:'OK',cls:'primary',action:'closeModal()'}]);
    return;
  }
  const profiles = getProfiles();
  state.activePlayers = state.selectedProfileIds.map(id => profiles.find(p => p.id === id)).filter(Boolean);
  state.scores = state.activePlayers.map(() => HOLES.map(h => emptyScore(h)));
  state.currentHole = state.startHole;
  state.currentPlayer = 0;
  state.roundStarted = true;
  showScreen('scoring');
  renderScoringScreen();
}

// ===== EXIT LIVE ROUND =====
function confirmExitRound() {
  showModal('✕', 'Exit Round?', 'Your progress will be lost. Are you sure you want to exit this round?', [
    { label: 'Stay', cls: 'primary', action: 'closeModal()' },
    { label: 'Exit Round', cls: 'danger', action: 'exitRound()' },
  ]);
}
function exitRound() {
  closeModal();
  state.roundStarted = false;
  showScreen('home');
}

// ===== SCORING =====
function renderScoringScreen() {
  const hole = HOLES[state.currentHole];
  document.getElementById('hole-badge').textContent = `HOLE ${hole.num}`;
  document.getElementById('hole-name-header').textContent = hole.name;
  document.getElementById('hole-par-badge').textContent = `Par ${hole.par}`;
  renderHoleStrip();
  renderPlayerSwitcher();
  renderScoreBody();
  const isLast = state.currentHole === HOLES.length - 1;
  const btn = document.getElementById('btn-next');
  btn.textContent = isLast ? 'FINISH ROUND ✓' : 'SAVE & NEXT ›';
  btn.className = 'btn-next-hole' + (isLast ? ' finish' : '');
}

function renderHoleStrip() {
  const strip = document.getElementById('hole-strip');
  strip.innerHTML = HOLES.map((h, i) => {
    const anyScored = state.activePlayers.some((_, pi) => state.scores[pi][i].saved);
    const isCurrent = i === state.currentHole;
    let cls = 'hole-pip';
    if (isCurrent && anyScored) cls += ' current scored';
    else if (isCurrent) cls += ' current';
    else if (anyScored) cls += ' scored';
    const checkmark = anyScored ? '✓' : `${h.par}`;
    return `<div class="${cls}" onclick="jumpToHole(${i})">
      <div class="hole-pip-num">${h.num}</div>
      <div class="hole-pip-check">${checkmark}</div>
    </div>`;
  }).join('');
  setTimeout(() => {
    const cur = strip.querySelector('.current');
    if (cur) cur.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }, 50);
}

function renderPlayerSwitcher() {
  const switcher = document.getElementById('player-switcher');
  if (state.activePlayers.length <= 1) { switcher.style.display = 'none'; return; }
  switcher.style.display = 'flex';
  switcher.innerHTML = state.activePlayers.map((p, i) => {
    const color = PLAYER_COLORS[p.colorIdx];
    const net = calcRunningNet(i);
    const netStr = net === null ? '–' : net === 0 ? 'E' : net > 0 ? `+${net}` : `${net}`;
    return `
      <button class="player-chip ${i===state.currentPlayer?'active':''}" onclick="switchPlayer(${i})">
        <div class="player-chip-avatar" style="background:${color}">${getInitials(p.name)}</div>
        <span class="player-chip-name">${escHtml(p.name.split(' ')[0])}</span>
        <span class="player-chip-score">${netStr}</span>
      </button>
    `;
  }).join('');
}

function calcRunningNet(playerIdx, scoresRef, playersRef) {
  const sc = scoresRef || state.scores;
  const pl = playersRef || state.activePlayers;
  let net = 0, par = 0, hasAny = false;
  for (let h = 0; h < HOLES.length; h++) {
    const s = sc[playerIdx][h];
    if (s && s.saved) {
      net += Math.max(0, s.strokes - s.zonesHit.filter(Boolean).length);
      par += HOLES[h].par; hasAny = true;
    }
  }
  return hasAny ? net - par : null;
}

function switchPlayer(idx) { state.currentPlayer = idx; renderScoringScreen(); }

function renderScoreBody() {
  const hole = HOLES[state.currentHole];
  const score = state.scores[state.currentPlayer][state.currentHole];
  document.getElementById('score-body').innerHTML =
    renderHoleStats(hole) + renderManualInputs(hole, score) + renderScoreSummaryBar(hole, score);
}

function renderHoleStats(hole) {
  const rounds = getSavedRounds();
  const playerId = state.activePlayers[state.currentPlayer].id;
  const holeIdx = hole.num - 1;
  let netScores = [], totalZones = 0, totalZonePossible = 0, penalties = 0, rounds_count = 0;
  rounds.forEach(r => {
    r.players.forEach((rp, pi) => {
      if (rp.id !== playerId) return;
      const s = r.scores[pi][holeIdx];
      if (s && s.saved) {
        const zones = s.zonesHit ? s.zonesHit.filter(Boolean).length : 0;
        netScores.push(Math.max(0, s.strokes - zones));
        totalZones += zones; totalZonePossible += hole.zones; penalties += s.penalties || 0; rounds_count++;
      }
    });
  });
  if (!netScores.length) return '';
  const avg = (netScores.reduce((a,b)=>a+b,0)/netScores.length).toFixed(1);
  const best = Math.min(...netScores);
  const zonesPerRound = rounds_count > 0 ? (totalZones / rounds_count).toFixed(1) : '0.0';
  const penPct = rounds_count > 0 ? (penalties/rounds_count).toFixed(1) : '0.0';
  const bestVsPar = best - hole.par;
  const playerName = state.activePlayers[state.currentPlayer].name.split(' ')[0];
  return `
    <div class="hole-stats-card">
      <div class="hole-stats-title">${escHtml(playerName)}'s Stats — Hole ${hole.num}</div>
      <div class="hole-stats-row">
        <div class="hole-stat"><div class="hole-stat-val">${avg}</div><div class="hole-stat-lbl">Avg Score</div></div>
        <div class="hole-stat"><div class="hole-stat-val ${bestVsPar<0?'under':bestVsPar>0?'over':''}">${best}</div><div class="hole-stat-lbl">Best</div></div>
        <div class="hole-stat"><div class="hole-stat-val">${zonesPerRound}</div><div class="hole-stat-lbl">Zone Avg</div></div>
        <div class="hole-stat"><div class="hole-stat-val">${penPct}</div><div class="hole-stat-lbl">Penalty Avg</div></div>
      </div>
    </div>
  `;
}

function renderManualInputs(hole, score) {
  const zoneChips = score.zonesHit.map((hit, i) => `
    <div class="zone-chip ${hit?'hit':''}" onclick="toggleZone(${i})">
      <div class="zone-chip-dot"></div>Zone ${i+1}
    </div>
  `).join('');
  const playerName = state.activePlayers[state.currentPlayer].name.split(' ')[0];
  const color = PLAYER_COLORS[state.activePlayers[state.currentPlayer].colorIdx];
  return `
    <div class="score-inputs-card">
      <div class="score-section-header" style="display:flex;align-items:center;gap:7px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0;"></span>
        ${escHtml(playerName)}
      </div>
      <div class="stroke-stepper-wrap">
        <div class="stroke-stepper-label">
          <div class="stroke-stepper-label-text">Strokes Taken</div>
        </div>
        <div class="stroke-stepper">
          <button class="stroke-step-btn" onclick="adjustStrokes(-1)">−</button>
          <div class="stroke-step-val" id="stroke-val">${score.strokes}</div>
          <button class="stroke-step-btn" onclick="adjustStrokes(1)">+</button>
        </div>
      </div>
      <div class="score-section-header">Zones Hit</div>
      <div class="zones-wrap"><div class="zones-grid" id="zones-grid">${zoneChips}</div></div>
      <div class="score-section-header">Penalties</div>
      <div class="input-row">
        <div class="input-row-label">
          <div class="input-row-label-text">Rough penalties</div>
          <div class="input-row-sub">Already in raw strokes — tracking only</div>
        </div>
        <div class="input-stepper">
          <button class="stepper-btn" onclick="adjustPenalties(-1)">−</button>
          <div class="stepper-val" id="penalty-val">${score.penalties}</div>
          <button class="stepper-btn" onclick="adjustPenalties(1)">+</button>
        </div>
      </div>
    </div>
  `;
}

function renderScoreSummaryBar(hole, score) {
  const zonesCount = score.zonesHit.filter(Boolean).length;
  const holeNet = Math.max(0, score.strokes - zonesCount);
  const holeVsPar = holeNet - hole.par;
  const holeVsParStr = holeVsPar === 0 ? 'E' : holeVsPar > 0 ? `+${holeVsPar}` : `${holeVsPar}`;
  const holeLabel = holeVsPar < 0 ? (holeVsPar===-1?'BIRDIE':holeVsPar===-2?'EAGLE':'EAGLE+') :
    holeVsPar > 0 ? (holeVsPar===1?'BOGEY':holeVsPar===2?'DOUBLE':holeVsPar===3?'TRIPLE':'OVER') : 'PAR';
  const holeClass = holeVsPar < 0 ? 'under' : holeVsPar > 0 ? 'over' : 'even';
  const runNet = calcRunningNet(state.currentPlayer, state.scores, state.activePlayers);
  const runStr = runNet === null ? '–' : runNet === 0 ? 'E' : runNet > 0 ? `+${runNet}` : `${runNet}`;
  const runClass = runNet === null ? 'even' : runNet < 0 ? 'under' : runNet > 0 ? 'over' : 'even';
  const firstName = state.activePlayers[state.currentPlayer].name.split(' ')[0];
  return `
    <div class="score-summary-bar">
      <div class="summary-left">
        <div class="lbl">Round Score</div>
        <div class="big-val ${runClass}">${runStr}</div>
        <div class="player-name-lbl">${escHtml(firstName)}</div>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-right">
        <div class="summary-right-row">
          <div class="sr-lbl">This Hole Net</div>
          <div class="sr-val ${holeClass}">${holeVsParStr} · ${holeLabel}</div>
        </div>
        <div class="summary-right-divider"></div>
        <div class="summary-right-row">
          <div class="sr-lbl">Strokes</div>
          <div class="sr-val">${score.strokes}</div>
        </div>
        <div class="summary-right-row">
          <div class="sr-lbl">Zones Hit</div>
          <div class="sr-val">${zonesCount}</div>
        </div>
        <div class="summary-right-row">
          <div class="sr-lbl">Net Score</div>
          <div class="sr-val">${holeNet}</div>
        </div>
      </div>
    </div>
  `;
}

// ===== LIVE SCORING ADJUSTERS (write to state) =====
function adjustStrokes(delta) {
  const score = state.scores[state.currentPlayer][state.currentHole];
  score.strokes = Math.max(1, Math.min(20, score.strokes + delta));
  document.getElementById('stroke-val').textContent = score.strokes;
  updateScoreSummaryBar();
}

function updateScoreSummaryBar() {
  const hole = HOLES[state.currentHole];
  const score = state.scores[state.currentPlayer][state.currentHole];
  const existing = document.getElementById('score-body').querySelector('.score-summary-bar');
  if (existing) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderScoreSummaryBar(hole, score);
    existing.replaceWith(tmp.firstChild);
  }
  renderPlayerSwitcher();
}

function toggleZone(idx) {
  const score = state.scores[state.currentPlayer][state.currentHole];
  score.zonesHit[idx] = !score.zonesHit[idx];
  const grid = document.getElementById('zones-grid');
  if (grid) {
    grid.innerHTML = score.zonesHit.map((hit, i) => `
      <div class="zone-chip ${hit?'hit':''}" onclick="toggleZone(${i})">
        <div class="zone-chip-dot"></div>Zone ${i+1}
      </div>
    `).join('');
  }
  updateScoreSummaryBar();
}

function adjustPenalties(delta) {
  const score = state.scores[state.currentPlayer][state.currentHole];
  score.penalties = Math.max(0, score.penalties + delta);
  document.getElementById('penalty-val').textContent = score.penalties;
}

function prevHole() {
  if (state.currentHole > 0) { state.currentHole--; renderScoringScreen(); }
}
function nextHoleArrow() {
  if (state.currentHole < HOLES.length - 1) { state.currentHole++; renderScoringScreen(); }
}
function jumpToHole(idx) { state.currentHole = idx; renderScoringScreen(); }

function saveAndAdvance() {
  state.scores[state.currentPlayer][state.currentHole].saved = true;
  const allSaved = state.activePlayers.every((_, pi) => state.scores[pi][state.currentHole].saved);
  if (!allSaved) {
    state.currentPlayer = state.activePlayers.findIndex((_, pi) => !state.scores[pi][state.currentHole].saved);
    renderScoringScreen(); return;
  }
  if (state.currentHole >= HOLES.length - 1) { finishRound(); return; }
  state.currentHole++;
  state.currentPlayer = 0;
  renderScoringScreen();
  document.getElementById('score-body').scrollTop = 0;
}

// ===== FINISH =====
function finishRound() {
  const round = {
    id: Date.now().toString(),
    date: new Date().toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric',year:'numeric'}),
    time: new Date().toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'}),
    players: state.activePlayers.map(p => ({id:p.id,name:p.name,colorIdx:p.colorIdx})),
    scores: state.scores, startHole: state.startHole,
  };
  const rounds = getSavedRounds();
  rounds.push(round);
  localStorage.setItem('pz_rounds', JSON.stringify(rounds));
  showScreen('summary');
  renderSummary(round);
}

// ===== EDIT ROUND: OPEN =====
function openEditRound(roundIdx) {
  const rounds = getSavedRounds();
  const round = rounds[roundIdx];
  if (!round) return;
  editState.roundIdx = roundIdx;
  editState.currentHole = 0;
  editState.currentPlayer = 0;
  editState.scores = JSON.parse(JSON.stringify(round.scores));
  editState.activePlayers = round.players;
  editState.expandedPlayer = null; // track which player row is expanded
  document.getElementById('edit-nav-title').textContent = round.date;
  showScreen('edit-round');
  renderEditScorecardTable();
}

// ===== EDIT ROUND: RENDER SCORECARD TABLE =====
function renderEditScorecardTable() {
  const front = HOLES.slice(0, 9);
  const back = HOLES.slice(9, 18);

  function sectionTotals(pi, holeList) {
    let strokes=0, zones=0, net=0, par=0, penalties=0;
    holeList.forEach(h => {
      const s = editState.scores[pi][h.num - 1];
      if (s) {
        const z = s.zonesHit ? s.zonesHit.filter(Boolean).length : 0;
        strokes += s.strokes; zones += z;
        net += Math.max(0, s.strokes - z); par += h.par; penalties += s.penalties||0;
      }
    });
    return {strokes, zones, net, par, penalties};
  }

  let tableHtml = `
    <div class="edit-info-banner">
      <div class="edit-info-banner-text">
        ✏️ Tap a <span>player name</span> to expand their holes, then tap any value to edit it
      </div>
    </div>
    <div class="sc-wrap" style="margin-bottom:14px">
      <table class="sc-table" id="edit-sc-table">
        <thead>
          <tr>
            <th class="sticky-col">PLAYER</th>
            ${front.map(h=>`<th>${h.num}</th>`).join('')}
            <th style="background:#2a5240;color:var(--sand)">OUT</th>
            ${back.map(h=>`<th>${h.num}</th>`).join('')}
            <th style="background:#2a5240;color:var(--sand)">IN</th>
            <th style="background:#1a3a2a;color:var(--sand)">TOT</th>
          </tr>
          <tr>
            <td class="sticky-col" style="background:#f8f9fa;color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;">PAR</td>
            ${front.map(h=>`<td style="background:#f8f9fa;color:var(--muted)">${h.par}</td>`).join('')}
            <td style="background:#f0f7f4;font-weight:700;color:var(--green-dark)">${front.reduce((a,h)=>a+h.par,0)}</td>
            ${back.map(h=>`<td style="background:#f8f9fa;color:var(--muted)">${h.par}</td>`).join('')}
            <td style="background:#f0f7f4;font-weight:700;color:var(--green-dark)">${back.reduce((a,h)=>a+h.par,0)}</td>
            <td style="background:#f0fdf4;font-weight:700;color:var(--green-dark)">${HOLES.reduce((a,h)=>a+h.par,0)}</td>
          </tr>
        </thead>
        <tbody id="edit-sc-tbody"></tbody>
      </table>
    </div>
  `;
  document.getElementById('edit-sc-body').innerHTML = tableHtml;
  renderEditTbody();
}

function renderEditTbody() {
  const front = HOLES.slice(0, 9);
  const back = HOLES.slice(9, 18);
  const tbody = document.getElementById('edit-sc-tbody');
  if (!tbody) return;

  function sectionTotals(pi, holeList) {
    let strokes=0, zones=0, net=0, par=0, penalties=0;
    holeList.forEach(h => {
      const s = editState.scores[pi][h.num - 1];
      if (s) {
        const z = s.zonesHit ? s.zonesHit.filter(Boolean).length : 0;
        strokes += s.strokes; zones += z;
        net += Math.max(0, s.strokes - z); par += h.par; penalties += s.penalties||0;
      }
    });
    return {strokes, zones, net, par, penalties};
  }

  let html = '';
  editState.activePlayers.forEach((p, pi) => {
    const color = PLAYER_COLORS[p.colorIdx];
    const fTot = sectionTotals(pi, front);
    const bTot = sectionTotals(pi, back);
    const total = { net: fTot.net+bTot.net, par: fTot.par+bTot.par };
    const tv = total.net - total.par;
    const tvStr = tv===0?'E':tv>0?`+${tv}`:`${tv}`;
    const isExpanded = editState.expandedPlayer === pi;

    // Player header row — tap to expand
    html += `
      <tr class="edit-player-header" onclick="toggleEditExpand(${pi})">
        <td class="sticky-col" colspan="${front.length + back.length + 3}"
          style="background:#f8f9fa;border-top:2px solid #e5e7eb;font-family:'Bebas Neue',cursive;font-size:10px;letter-spacing:1px;color:var(--muted);padding:6px 10px;cursor:pointer;">
          <span style="display:inline-flex;align-items:center;gap:6px;width:100%">
            <span style="width:12px;height:12px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>
            ${escHtml(p.name).toUpperCase()}
            <span class="expand-arrow ${isExpanded?'open':''}">▾</span>
          </span>
        </td>
      </tr>
    `;

    // Summary rows (read-only totals, always visible)
    html += `
      <tr>
        <td class="sticky-col">Strokes</td>
        ${front.map((h,hi) => { const s=editState.scores[pi][h.num-1]; return `<td>${s?s.strokes:'–'}</td>`; }).join('')}
        <td style="background:#f0f7f4;font-weight:700">${fTot.strokes||'–'}</td>
        ${back.map((h,hi) => { const s=editState.scores[pi][h.num-1]; return `<td>${s?s.strokes:'–'}</td>`; }).join('')}
        <td style="background:#f0f7f4;font-weight:700">${bTot.strokes||'–'}</td>
        <td style="background:#f0fdf4;font-weight:700">${fTot.strokes+bTot.strokes||'–'}</td>
      </tr>
      <tr>
        <td class="sticky-col">Zones</td>
        ${front.map(h => { const s=editState.scores[pi][h.num-1]; const z=s&&s.zonesHit?s.zonesHit.filter(Boolean).length:0; return `<td>${s?z:'–'}</td>`; }).join('')}
        <td style="background:#f0f7f4;font-weight:700">${fTot.zones}</td>
        ${back.map(h => { const s=editState.scores[pi][h.num-1]; const z=s&&s.zonesHit?s.zonesHit.filter(Boolean).length:0; return `<td>${s?z:'–'}</td>`; }).join('')}
        <td style="background:#f0f7f4;font-weight:700">${bTot.zones}</td>
        <td style="background:#f0fdf4;font-weight:700">${fTot.zones+bTot.zones}</td>
      </tr>
      <tr class="subtotal-row">
        <td class="sticky-col">Net</td>
        ${front.map(h => { const s=editState.scores[pi][h.num-1]; if(!s)return`<td>–</td>`; const z=s.zonesHit?s.zonesHit.filter(Boolean).length:0; const n=Math.max(0,s.strokes-z); const d=n-h.par; return `<td class="${d<0?'sc-net-under':d>0?'sc-net-over':''}">${n}</td>`; }).join('')}
        <td style="background:#e8f7ef;font-weight:700">${fTot.net||'–'}</td>
        ${back.map(h => { const s=editState.scores[pi][h.num-1]; if(!s)return`<td>–</td>`; const z=s.zonesHit?s.zonesHit.filter(Boolean).length:0; const n=Math.max(0,s.strokes-z); const d=n-h.par; return `<td class="${d<0?'sc-net-under':d>0?'sc-net-over':''}">${n}</td>`; }).join('')}
        <td style="background:#e8f7ef;font-weight:700">${bTot.net||'–'}</td>
        <td class="${tv<0?'sc-net-under':tv>0?'sc-net-over':''}" style="font-weight:800;font-size:13px">${total.net} (${tvStr})</td>
      </tr>
    `;

    // Expanded per-hole edit list
    if (isExpanded) {
      html += `<tr class="edit-hole-list-row"><td colspan="${front.length + back.length + 3}" style="padding:0">
        <div class="edit-hole-list">
          ${HOLES.map((h, hi) => {
            const s = editState.scores[pi][hi];
            if (!s) return '';
            const z = s.zonesHit ? s.zonesHit.filter(Boolean).length : 0;
            const n = Math.max(0, s.strokes - z);
            const d = n - h.par;
            const dStr = d===0?'E':d>0?`+${d}`:`${d}`;
            const dColor = d<0?'#16a34a':d>0?'var(--flag)':'var(--muted)';
            return `
              <div class="ehl-row">
                <div class="ehl-hole-num">${h.num}</div>
                <div class="ehl-hole-name">${escHtml(h.name)}<br>Par ${h.par}</div>
                <div class="ehl-chips">
                  <div class="ehl-chip" id="ehl-s-${pi}-${hi}" onclick="openBs(${pi},${hi},'strokes')">
                    <div class="ehl-chip-val">${s.strokes}</div>
                    <div class="ehl-chip-lbl">Strokes</div>
                  </div>
                  <div class="ehl-chip" id="ehl-z-${pi}-${hi}" onclick="openBs(${pi},${hi},'zones')">
                    <div class="ehl-chip-val">${z}/${h.zones}</div>
                    <div class="ehl-chip-lbl">Zones</div>
                  </div>
                  <div class="ehl-chip" id="ehl-p-${pi}-${hi}" onclick="openBs(${pi},${hi},'penalties')">
                    <div class="ehl-chip-val">${s.penalties||0}</div>
                    <div class="ehl-chip-lbl">Pen</div>
                  </div>
                  <div class="ehl-net">
                    <div class="ehl-net-val" style="color:${dColor}">${dStr}</div>
                    <div class="ehl-chip-lbl">Net</div>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </td></tr>`;
    }
  });
  tbody.innerHTML = html;
}

function toggleEditExpand(pi) {
  closeBs();
  editState.expandedPlayer = editState.expandedPlayer === pi ? null : pi;
  renderEditTbody();
  // Scroll expanded player into view
  setTimeout(() => {
    const tbody = document.getElementById('edit-sc-tbody');
    if (tbody) {
      const rows = tbody.querySelectorAll('.edit-player-header');

// ===== BOTTOM SHEET =====
let bsTarget = null; // { pi, hi, field }

function openBs(pi, hi, field) {
  bsTarget = { pi, hi, field };
  const h = HOLES[hi];
  const s = editState.scores[pi][hi];
  const p = editState.activePlayers[pi];
  const fieldLabel = field==='strokes'?'Strokes Taken':field==='zones'?'Zones Hit':'Penalties';

  document.getElementById('bs-title').textContent = `${p.name} · Hole ${h.num}`;
  document.getElementById('bs-subtitle').textContent = `${h.name} · Par ${h.par} · ${fieldLabel}`;

  let bodyHtml = '';
  if (field === 'strokes') {
    bodyHtml = `
      <div class="bs-field-label">Strokes Taken</div>
      <div class="bs-stroke-row">
        <div class="bs-stepper">
          <button class="bs-step-btn" onclick="bsAdjust(-1)">−</button>
          <div class="bs-step-val" id="bs-val">${s.strokes}</div>
          <button class="bs-step-btn" onclick="bsAdjust(1)">+</button>
        </div>
        <div style="font-size:12px;color:var(--muted)">Par ${h.par}</div>
      </div>
      <button class="bs-done-btn" onclick="closeBs()">Done ✓</button>
    `;
  } else if (field === 'zones') {
    const chips = s.zonesHit.map((hit, i) => `
      <div class="bs-zone-chip ${hit?'hit':''}" id="bs-zchip-${i}" onclick="bsToggleZone(${i})">
        <div class="bs-zone-dot"></div>Zone ${i+1}
      </div>
    `).join('');
    bodyHtml = `
      <div class="bs-field-label">Zones Hit (${h.zones} available on this hole)</div>
      <div class="bs-zones-grid">${chips}</div>
      <button class="bs-done-btn" onclick="closeBs()">Done ✓</button>
    `;
  } else {
    bodyHtml = `
      <div class="bs-field-label">Rough Penalties (tracking only)</div>
      <div class="bs-pen-row">
        <div class="bs-pen-stepper">
          <button class="bs-pen-btn" onclick="bsAdjust(-1)">−</button>
          <div class="bs-pen-val" id="bs-val">${s.penalties||0}</div>
          <button class="bs-pen-btn" onclick="bsAdjust(1)">+</button>
        </div>
      </div>
      <button class="bs-done-btn" onclick="closeBs()">Done ✓</button>
    `;
  }
  document.getElementById('bs-body').innerHTML = bodyHtml;
  // Highlight active chip
  document.querySelectorAll('.ehl-chip').forEach(c => c.classList.remove('active-chip'));
  const chipId = `ehl-${field[0]}-${pi}-${hi}`;
  const chip = document.getElementById(chipId);
  if (chip) chip.classList.add('active-chip');

  document.getElementById('bs-overlay').classList.add('show');
}

function bsAdjust(delta) {
  if (!bsTarget) return;
  const { pi, hi, field } = bsTarget;
  const s = editState.scores[pi][hi];
  if (field === 'strokes') {
    s.strokes = Math.max(1, Math.min(20, s.strokes + delta));
    const el = document.getElementById('bs-val');
    if (el) el.textContent = s.strokes;
    // Update chip in the list
    const chip = document.getElementById(`ehl-s-${pi}-${hi}`);
    if (chip) chip.querySelector('.ehl-chip-val').textContent = s.strokes;
  } else if (field === 'penalties') {
    s.penalties = Math.max(0, (s.penalties||0) + delta);
    const el = document.getElementById('bs-val');
    if (el) el.textContent = s.penalties;
    const chip = document.getElementById(`ehl-p-${pi}-${hi}`);
    if (chip) chip.querySelector('.ehl-chip-val').textContent = s.penalties;
  }
  refreshNetForHole(pi, hi);
}

function bsToggleZone(idx) {
  if (!bsTarget) return;
  const { pi, hi } = bsTarget;
  const s = editState.scores[pi][hi];
  s.zonesHit[idx] = !s.zonesHit[idx];
  const chip = document.getElementById(`bs-zchip-${idx}`);
  if (chip) chip.classList.toggle('hit');
  // Update zone chip in hole list
  const zChip = document.getElementById(`ehl-z-${pi}-${hi}`);
  if (zChip) zChip.querySelector('.ehl-chip-val').textContent = `${s.zonesHit.filter(Boolean).length}/${HOLES[hi].zones}`;
  refreshNetForHole(pi, hi);
}

function refreshNetForHole(pi, hi) {
  // Updates the net display in the expanded list for this hole without full re-render
  const s = editState.scores[pi][hi];
  const h = HOLES[hi];
  const z = s.zonesHit ? s.zonesHit.filter(Boolean).length : 0;
  const n = Math.max(0, s.strokes - z);
  const d = n - h.par;
  const dStr = d===0?'E':d>0?`+${d}`:`${d}`;
  const dColor = d<0?'#16a34a':d>0?'var(--flag)':'var(--muted)';
  // Find the net display in the ehl-row for this hole
  const rows = document.querySelectorAll('.ehl-row');
  if (rows[hi]) {
    const netEl = rows[hi].querySelector('.ehl-net-val');
    if (netEl) { netEl.textContent = dStr; netEl.style.color = dColor; }
  }
}

function closeBs() {
  document.getElementById('bs-overlay').classList.remove('show');
  document.querySelectorAll('.ehl-chip').forEach(c => c.classList.remove('active-chip'));
  // Re-render the summary rows (strokes/zones/net totals) after any change
  renderEditTbody();
  bsTarget = null;
}

function closeBsOverlay(e) {
  if (e.target === document.getElementById('bs-overlay')) closeBs();
}

/*
 * NEW: saveEditedRound()
 * Writes editState.scores back into the correct round in localStorage,
 * then returns to the round detail view showing the updated scorecard.
 */
function saveEditedRound() {
  const rounds = getSavedRounds();
  if (editState.roundIdx < 0 || editState.roundIdx >= rounds.length) return;
  rounds[editState.roundIdx].scores = editState.scores;
  localStorage.setItem('pz_rounds', JSON.stringify(rounds));
  // Return to detail view for that round
  showScreen('scorecard');
  renderScorecardList();
  openRoundDetail(editState.roundIdx);
}

    { label: 'Discard', cls: 'danger', action: 'discardEdit()' },
  ]);
}
