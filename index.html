/*
 * NEW: confirmDeleteRound() / doDeleteRound()
 * Shows a strong confirmation modal before permanently removing a round.
 * On confirm, removes it from localStorage and returns to the scorecards list.
 */
function confirmDeleteRound() {
  const rounds = getSavedRounds();
  const round = rounds[editState.roundIdx];
  if (!round) return;
  showModal(
    '🗑️',
    'Delete Round?',
    `This will permanently delete the round from ${round.date}. This cannot be undone.`,
    [
      { label: 'Cancel', cls: 'cancel', action: 'closeModal()' },
      { label: 'Delete Round', cls: 'danger', action: 'doDeleteRound()' },
    ]
  );
}
function doDeleteRound() {
  closeModal();
  const rounds = getSavedRounds();
  rounds.splice(editState.roundIdx, 1);
  localStorage.setItem('pz_rounds', JSON.stringify(rounds));
  editState.roundIdx = -1;
  showScreen('scorecard');
  renderScorecardList();
}

// ===== SHARED SCORECARD TABLE BUILDER =====
function buildScorecardHTML(round) {
  const front = HOLES.slice(0, 9);
  const back = HOLES.slice(9, 18);

  function playerSectionData(pi, holeList) {
    return holeList.map(h => { const s = round.scores[pi][h.num - 1]; return s && s.saved ? s : null; });
  }

  function sectionTotals(pi, holeList) {
    let strokes=0, zones=0, net=0, par=0, penalties=0;
    holeList.forEach(h => {
      const s = round.scores[pi][h.num - 1];
      if (s && s.saved) {
        const z = s.zonesHit ? s.zonesHit.filter(Boolean).length : 0;
        strokes += s.strokes; zones += z; net += Math.max(0, s.strokes - z); par += h.par; penalties += s.penalties||0;
      }
    });
    return {strokes, zones, net, par, penalties};
  }

  function cellNet(s, h) {
    if (!s) return `<td>–</td>`;
    const z = s.zonesHit ? s.zonesHit.filter(Boolean).length : 0;
    const n = Math.max(0, s.strokes - z);
    const d = n - h.par;
    return `<td class="${d<0?'sc-net-under':d>0?'sc-net-over':''}">${n}</td>`;
  }

  function cellPen(s) {
    if (!s) return `<td>–</td>`;
    const p = s.penalties || 0;
    return `<td class="${p > 0 ? 'sc-net-over' : 'sc-pen-val'}">${p > 0 ? p : '·'}</td>`;
  }

  let html = `<table class="sc-table">
    <thead>
      <tr>
        <th class="sticky-col">PLAYER</th>
        ${front.map(h=>`<th>${h.num}</th>`).join('')}
        <th style="background:#2a5240;color:var(--sand)">OUT</th>
        ${back.map(h=>`<th>${h.num}</th>`).join('')}
        <th style="background:#2a5240;color:var(--sand)">IN</th>
        <th style="background:#1a3a2a;color:var(--sand)">TOT</th>
      </tr>
      <tr>
        <td class="sticky-col" style="background:#f8f9fa;color:var(--muted);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">PAR</td>
        ${front.map(h=>`<td style="background:#f8f9fa;color:var(--muted)">${h.par}</td>`).join('')}
        <td style="background:#f0f7f4;font-weight:700;color:var(--green-dark)">${front.reduce((a,h)=>a+h.par,0)}</td>
        ${back.map(h=>`<td style="background:#f8f9fa;color:var(--muted)">${h.par}</td>`).join('')}
        <td style="background:#f0f7f4;font-weight:700;color:var(--green-dark)">${back.reduce((a,h)=>a+h.par,0)}</td>
        <td style="background:#f0fdf4;font-weight:700;color:var(--green-dark)">${HOLES.reduce((a,h)=>a+h.par,0)}</td>
      </tr>
    </thead><tbody>`;

  round.players.forEach((p, pi) => {
    const color = PLAYER_COLORS[p.colorIdx];
    const frontData = playerSectionData(pi, front);
    const backData = playerSectionData(pi, back);
    const fTot = sectionTotals(pi, front);
    const bTot = sectionTotals(pi, back);
    const total = { strokes: fTot.strokes+bTot.strokes, zones: fTot.zones+bTot.zones, net: fTot.net+bTot.net, par: fTot.par+bTot.par, penalties: fTot.penalties+bTot.penalties };
    const totalVsPar = total.net - total.par;
    const totalStr = totalVsPar===0?'E':totalVsPar>0?`+${totalVsPar}`:`${totalVsPar}`;

    html += `
      <tr class="group-header">
        <td class="sticky-col" colspan="${front.length+back.length+3}" style="padding-left:10px">
          <span style="display:inline-flex;align-items:center;gap:6px">
            <span style="width:12px;height:12px;border-radius:50%;background:${color};display:inline-block"></span>
            ${escHtml(p.name).toUpperCase()}
          </span>
        </td>
      </tr>
      <tr>
        <td class="sticky-col">Strokes</td>
        ${frontData.map(s=>`<td>${s?s.strokes:'–'}</td>`).join('')}
        <td style="background:#f0f7f4;font-weight:700">${fTot.strokes||'–'}</td>
        ${backData.map(s=>`<td>${s?s.strokes:'–'}</td>`).join('')}
        <td style="background:#f0f7f4;font-weight:700">${bTot.strokes||'–'}</td>
        <td style="background:#f0fdf4;font-weight:700">${total.strokes||'–'}</td>
      </tr>
      <tr>
        <td class="sticky-col">Zones</td>
        ${frontData.map(s=>{if(!s)return`<td>–</td>`;const z=s.zonesHit?s.zonesHit.filter(Boolean).length:0;return`<td>${z}</td>`;}).join('')}
        <td style="background:#f0f7f4;font-weight:700">${fTot.zones}</td>
        ${backData.map(s=>{if(!s)return`<td>–</td>`;const z=s.zonesHit?s.zonesHit.filter(Boolean).length:0;return`<td>${z}</td>`;}).join('')}
        <td style="background:#f0f7f4;font-weight:700">${bTot.zones}</td>
        <td style="background:#f0fdf4;font-weight:700">${fTot.zones+bTot.zones}</td>
      </tr>
      <tr>
        <td class="sticky-col" style="color:var(--muted)">Penalties</td>
        ${frontData.map(s=>cellPen(s)).join('')}
        <td style="background:#f0f7f4;font-weight:700;color:${fTot.penalties>0?'var(--flag)':'var(--muted)'}">${fTot.penalties>0?fTot.penalties:'·'}</td>
        ${backData.map(s=>cellPen(s)).join('')}
        <td style="background:#f0f7f4;font-weight:700;color:${bTot.penalties>0?'var(--flag)':'var(--muted)'}">${bTot.penalties>0?bTot.penalties:'·'}</td>
        <td style="background:#f0fdf4;font-weight:700;color:${total.penalties>0?'var(--flag)':'var(--muted)'}">${total.penalties>0?total.penalties:'·'}</td>
      </tr>
      <tr class="subtotal-row">
        <td class="sticky-col">Net</td>
        ${frontData.map((s,i)=>cellNet(s,front[i])).join('')}
        <td style="background:#e8f7ef;font-weight:700">${fTot.net||'–'}</td>
        ${backData.map((s,i)=>cellNet(s,back[i])).join('')}
        <td style="background:#e8f7ef;font-weight:700">${bTot.net||'–'}</td>
        <td class="${totalVsPar<0?'sc-net-under':totalVsPar>0?'sc-net-over':''}" style="font-weight:800;font-size:13px">${total.net} (${totalStr})</td>
      </tr>
    `;
  });

  html += `</tbody></table>`;
  return `<div class="sc-wrap">${html}</div>`;
}

// ===== TIE HANDLING =====
function calcRoundTotals(round) {
  return round.players.map((p, pi) => {
    let net=0, par=0, zones=0, penalties=0, strokes=0;
    round.scores[pi].forEach((s, hi) => {
      if (s && s.saved) {
        const z = s.zonesHit ? s.zonesHit.filter(Boolean).length : 0;
        net += Math.max(0, s.strokes - z); par += HOLES[hi].par; zones += z; penalties += s.penalties||0; strokes += s.strokes;
      }
    });
    return {...p, net, par, zones, penalties, strokes, vsPar: net - par, pi};
  }).sort((a,b) => a.vsPar - b.vsPar);
}

function renderSummaryWinnerBar(round, overrideWinner) {
  const totals = calcRoundTotals(round);
  const topScore = totals[0].vsPar;
  const tied = totals.filter(t => t.vsPar === topScore);
  const isTied = tied.length > 1 && !overrideWinner;

  if (overrideWinner === 'tie') {
    document.getElementById('summary-winner-bar').innerHTML = `
      <div class="sw-trophy">🤝</div>
      <div class="sw-info">
        <div class="sw-label">Result</div>
        <div class="sw-name" style="font-size:18px">${tied.map(t=>escHtml(t.name.split(' ')[0])).join(' & ')}</div>
        <div class="sw-detail">${topScore===0?'E':topScore>0?`+${topScore}`:topScore} · Tied</div>
      </div>
    `;
    return;
  }

  const winner = overrideWinner ? totals.find(t=>t.id===overrideWinner) || totals[0] : totals[0];

  if (isTied) {
    const tiedPlayersHtml = tied.map(t => {
      const color = PLAYER_COLORS[t.colorIdx];
      return `
        <button class="tie-player-btn" onclick="resolveTie('${round.id}', '${t.id}')">
          <div class="tie-player-avatar" style="background:${color}">${getInitials(t.name)}</div>
          <div>
            <div class="tie-player-name">${escHtml(t.name)}</div>
            <div class="tie-player-score">${t.net} net · ${t.vsPar===0?'E':t.vsPar>0?`+${t.vsPar}`:t.vsPar}</div>
          </div>
          <div style="margin-left:auto;color:var(--green-bright);font-size:18px">›</div>
        </button>
      `;
    }).join('');
    document.getElementById('summary-winner-bar').innerHTML = `
      <div style="width:100%">
        <div class="sw-label" style="margin-bottom:4px">🤝 TIE — Select tiebreaker winner or declare tied:</div>
        <div class="tie-players-grid">${tiedPlayersHtml}</div>
        <button class="tie-btn-declare" onclick="resolveTie('${round.id}', 'tie')">Declare Tied (No Tiebreaker)</button>
      </div>
    `;
    return;
  }

  document.getElementById('summary-winner-bar').innerHTML = `
    <div class="sw-trophy">🏆</div>
    <div class="sw-info">
      <div class="sw-label">Winner</div>
      <div class="sw-name">${escHtml(winner.name)}</div>
    </div>
    <div style="text-align:right">
      <div style="color:var(--sand);font-family:'Bebas Neue',cursive;font-size:24px">${winner.vsPar===0?'E':winner.vsPar>0?`+${winner.vsPar}`:winner.vsPar}</div>
      <div class="sw-detail" style="font-size:11px">${winner.net} net · ${winner.strokes} strokes</div>
    </div>
  `;
}

let currentSummaryRound = null;
let currentSummaryOverride = null;

function resolveTie(roundId, winnerId) {
  currentSummaryOverride = winnerId;
  renderSummaryWinnerBar(currentSummaryRound, winnerId);
}

function renderScorecardList() {

  if (!rounds.length) {
    body.innerHTML = `<div style="text-align:center;color:var(--muted);padding:40px 20px;font-size:15px;">No rounds recorded yet.<br>Start a round to see your history here.</div>`;

      let net=0, par=0, strokes=0;

        }
      });
      return {...p, net, vsPar: net - par, strokes};
    }).sort((a,b) => a.vsPar - b.vsPar);

        <div class="rh-time">${r.time || ''}</div>

          const color = PLAYER_COLORS[p.colorIdx];
          const vsStr = p.vsPar===0?'E':p.vsPar>0?`+${p.vsPar}`:`${p.vsPar}`;
          const scoreColor = p.vsPar<0?'#16a34a':p.vsPar>0?'var(--flag)':'var(--muted)';
          return `<div class="rh-player-row">
            <div class="rh-avatar" style="background:${color}">${getInitials(p.name)}</div>
            <div class="rh-name">${escHtml(p.name)}</div>
            <div class="rh-score" style="color:${scoreColor}">${vsStr}</div>
            <div class="rh-net">${p.net} net</div>
            ${i===0?`<div class="rh-arrow">›</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  body.innerHTML = html;
}

/*
 * MODIFIED: openRoundDetail()
 * Added an Edit Round button (edit-round-btn) in the header row next to
 * the "All Rounds" back button. Clicking it calls openEditRound(roundIdx).
 */
function openRoundDetail(roundIdx) {
  const rounds = getSavedRounds();
  const round = rounds[roundIdx];
  if (!round) return;
  document.getElementById('scorecard-nav-title').textContent = round.date;
  const body = document.getElementById('scorecard-body');

  const totals = calcRoundTotals(round);
  const topScore = totals[0].vsPar;
  const tied = totals.filter(t => t.vsPar === topScore);
  const winner = totals[0];
  const isTied = tied.length > 1;

  let winnerHtml;
  if (isTied) {
    winnerHtml = `
      <div style="background:var(--green-dark);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.12)">
        <div style="font-size:24px">🤝</div>
        <div style="flex:1">
          <div style="color:rgba(255,255,255,0.5);font-size:9px;text-transform:uppercase;letter-spacing:2px">Tie · ${round.date}${round.time?' · '+round.time:''}</div>
          <div style="font-family:'Bebas Neue',cursive;font-size:20px;color:var(--sand)">${tied.map(t=>escHtml(t.name.split(' ')[0])).join(' & ')}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Bebas Neue',cursive;font-size:26px;color:white">${topScore===0?'E':topScore>0?`+${topScore}`:topScore}</div>
        </div>
      </div>
    `;
  } else {
    winnerHtml = `
      <div style="background:var(--green-dark);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.12)">
        <div style="font-size:24px">🏆</div>
        <div style="flex:1">
          <div style="color:rgba(255,255,255,0.5);font-size:9px;text-transform:uppercase;letter-spacing:2px">Winner · ${round.date}${round.time?' · '+round.time:''}</div>
          <div style="font-family:'Bebas Neue',cursive;font-size:22px;color:var(--sand)">${escHtml(winner.name)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Bebas Neue',cursive;font-size:26px;color:${winner.vsPar<0?'#4ade80':winner.vsPar>0?'#f87171':'white'}">${winner.vsPar===0?'E':winner.vsPar>0?`+${winner.vsPar}`:winner.vsPar}</div>
          <div style="color:rgba(255,255,255,0.5);font-size:11px">${winner.net} net</div>
        </div>
      </div>
    `;
  }

  // NEW: header row now has Edit Round button alongside back button
  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;padding:0 0 12px;">
      <div class="round-detail-back" style="padding:0;flex:1" onclick="renderScorecardList()">
        <button class="round-detail-back-btn">‹</button>
        <span class="round-detail-back-lbl">All Rounds</span>
      </div>
      <button class="edit-round-btn" onclick="openEditRound(${roundIdx})">✏️ Edit Round</button>
    </div>
    ${winnerHtml}
    ${buildScorecardHTML(round)}
  `;
}

    body.innerHTML = `<div style="text-align:center;color:var(--muted);padding:40px 20px;font-size:15px;">No players yet.<br>Add players when starting a new round.</div>`;
    return;
  }
  body.innerHTML = profiles.map(p => {
    const color = PLAYER_COLORS[p.colorIdx];
    const stats = getProfileStats(p.id);
    return `
      <div class="profile-detail-card">
        <div class="profile-detail-header">
          <div class="profile-detail-avatar" style="background:${color};cursor:pointer" id="avatar-${p.id}"
            onclick="toggleColorPicker('${p.id}')"
            title="Tap to change color">
            ${getInitials(p.name)}
          </div>
          <div>
            <div class="profile-detail-name">${escHtml(p.name)}</div>
            <div class="profile-detail-rounds">${stats.rounds} round${stats.rounds!==1?'s':''} played</div>
            <div style="font-size:10px;color:var(--green-bright);margin-top:2px">Tap icon to change color</div>

          <button onclick="confirmDeleteProfile('${p.id}','${escHtml(p.name)}')" style="margin-left:auto;display:flex;align-items:center;gap:4px;background:rgba(230,57,70,0.07);border:1.5px solid rgba(230,57,70,0.2);color:var(--flag);border-radius:10px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;">🗑 Delete</button>
        </div>
        <div id="color-picker-wrap-${p.id}" style="display:none;padding:8px 0 4px;">
          <div class="color-picker-label">Pick a color</div>

        </div>
        ${stats.rounds > 0 ? `
          <div class="profile-stat-grid">
            <div class="profile-stat-box"><div class="val">${stats.avgScore}</div><div class="lbl">Avg Score</div></div>
            <div class="profile-stat-box"><div class="val">${stats.bestScore!==Infinity?stats.bestScore:'–'}</div><div class="lbl">Best Round</div></div>
            <div class="profile-stat-box"><div class="val">${stats.zonesPerRound}</div><div class="lbl">Zones/Rd</div></div>
            <div class="profile-stat-box"><div class="val">${stats.avgPenalties}</div><div class="lbl">Penalties/Rd</div></div>
            <div class="profile-stat-box"><div class="val">${stats.birdiesPerRound}</div><div class="lbl">Birdies/Rd</div></div>
            <div class="profile-stat-box"><div class="val">${stats.bogeysPerRound}</div><div class="lbl">Bogeys/Rd</div></div>
            <div class="profile-stat-box"><div class="val">${stats.blowupsPerRound}</div><div class="lbl">Blowups/Rd</div></div>
            <div class="profile-stat-box"><div class="val">${stats.totalAces}</div><div class="lbl">Aces</div></div>
            <div class="profile-stat-box"><div class="val">${stats.rounds}</div><div class="lbl">Rounds</div></div>
          </div>
          <div class="profile-stat-section-label">Par Scoring Averages</div>
          <div class="profile-stat-grid">
            <div class="profile-stat-box"><div class="val">${stats.par3Avg}</div><div class="lbl">Par 3 Avg</div></div>
            <div class="profile-stat-box"><div class="val">${stats.par4Avg}</div><div class="lbl">Par 4 Avg</div></div>
            <div class="profile-stat-box"><div class="val">${stats.par5Avg}</div><div class="lbl">Par 5 Avg</div></div>
          </div>
          <div class="profile-stat-section-label">Hole Performance</div>
          <div class="profile-stat-grid" style="grid-template-columns:repeat(2,1fr);">
            <div class="profile-stat-box" style="padding:10px 8px 10px">
              <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#16a34a;margin-bottom:4px">⛳ In The Zone</div>
              ${stats.bestHole ? `
                <div style="font-family:'Bebas Neue',cursive;font-size:22px;color:#16a34a;line-height:1">Hole ${stats.bestHole.num}</div>
                <div style="font-size:10px;color:var(--muted);margin-top:2px">Par ${stats.bestHole.par}</div>
                <div style="font-family:'Bebas Neue',cursive;font-size:17px;color:#16a34a;line-height:1.3">${stats.bestHole.avgVsPar}</div>
                <div style="font-size:9px;color:var(--muted)">avg ${stats.bestHole.avgNet}</div>
              ` : `<div style="font-family:'Bebas Neue',cursive;font-size:20px;color:var(--muted)">–</div>`}
            </div>
            <div class="profile-stat-box" style="padding:10px 8px 10px">
              <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--flag);margin-bottom:4px">🚩 Penalty Box</div>
              ${stats.worstHole ? `
                <div style="font-family:'Bebas Neue',cursive;font-size:22px;color:var(--flag);line-height:1">Hole ${stats.worstHole.num}</div>
                <div style="font-size:10px;color:var(--muted);margin-top:2px">Par ${stats.worstHole.par}</div>
                <div style="font-family:'Bebas Neue',cursive;font-size:17px;color:var(--flag);line-height:1.3">${stats.worstHole.avgVsPar}</div>
                <div style="font-size:9px;color:var(--muted)">avg ${stats.worstHole.avgNet}</div>
              ` : `<div style="font-family:'Bebas Neue',cursive;font-size:20px;color:var(--muted)">–</div>`}
            </div>
          </div>
        ` : `<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px 0">No round data yet.</div>`}
      </div>
    `;
  }).join('');
  profiles.forEach(p => {
    renderColorPicker(`color-picker-${p.id}`, p.colorIdx, `changeProfileColor_${p.id}`);
    window[`changeProfileColor_${p.id}`] = (idx) => {
      updateProfileColor(p.id, idx);
      renderColorPicker(`color-picker-${p.id}`, idx, `changeProfileColor_${p.id}`);
      const av = document.getElementById(`avatar-${p.id}`);
      if (av) av.style.background = PLAYER_COLORS[idx];
    };
  });
  window.toggleColorPicker = function(id) {
    const wrap = document.getElementById(`color-picker-wrap-${id}`);
    if (!wrap) return;
    const isOpen = wrap.style.display !== 'none';
    document.querySelectorAll('[id^="color-picker-wrap-"]').forEach(el => el.style.display = 'none');
    if (!isOpen) wrap.style.display = 'block';
  };
}

// ===== PROFILE STATS =====
function getProfileStats(profileId) {
  const rounds = getSavedRounds();
  let totalNet=0, totalPar=0, bestScore=Infinity, totalZones=0, totalZonePossible=0, totalPenalties=0;
  let totalBirdies=0, totalBogeys=0, totalBlowups=0, totalAces=0, roundCount=0;
  let par3Strokes=0, par3Count=0, par4Strokes=0, par4Count=0, par5Strokes=0, par5Count=0;
  const holeData = HOLES.map(() => ({ totalNet: 0, count: 0, totalZones: 0, totalPenalties: 0 }));

  rounds.forEach(r => {
    r.players.forEach((rp, pi) => {
      if (rp.id !== profileId) return;
      let rNet=0, rPar=0, rZones=0, rPen=0;
      let rBirdies=0, rBogeys=0, rBlowups=0, rAces=0, hasScore=false;
      r.scores[pi].forEach((s, hi) => {
        if (s && s.saved) {
          const z = s.zonesHit ? s.zonesHit.filter(Boolean).length : 0;
          const hNet = Math.max(0, s.strokes - z);
          const hPar = HOLES[hi].par;
          const diff = hNet - hPar;
          rNet += hNet; rPar += hPar; rZones += z; rPen += s.penalties||0;
          if (diff <= -1) rBirdies++;
          if (diff === 1) rBogeys++;
          if (diff >= 2) rBlowups++;
          if (hNet === 1) rAces++;
          if (hPar === 3) { par3Strokes += hNet; par3Count++; }
          if (hPar === 4) { par4Strokes += hNet; par4Count++; }
          if (hPar === 5) { par5Strokes += hNet; par5Count++; }
          holeData[hi].totalNet += hNet;
          holeData[hi].count++;
          holeData[hi].totalZones += z;
          holeData[hi].totalPenalties += s.penalties || 0;
          hasScore = true;
        }
      });
      if (hasScore) {
        totalNet += rNet; totalPar += rPar;
        if (rNet < bestScore) bestScore = rNet;
        totalZones += rZones; totalZonePossible += HOLES.reduce((a,h)=>a+h.zones,0);
        totalPenalties += rPen;
        totalBirdies += rBirdies; totalBogeys += rBogeys; totalBlowups += rBlowups;
        totalAces += rAces; roundCount++;
      }
    });
  });

  const fmt1 = v => roundCount > 0 ? (v / roundCount).toFixed(1) : '–';
  const avgScore = roundCount > 0 ? (totalNet / roundCount).toFixed(1) : '–';
  const zonesPerRound = roundCount > 0 ? (totalZones / roundCount).toFixed(1) : '–';
  const avgPenalties = roundCount > 0 ? (totalPenalties / roundCount).toFixed(1) : '–';
  const par3Avg = par3Count > 0 ? (par3Strokes / par3Count).toFixed(2) : '–';
  const par4Avg = par4Count > 0 ? (par4Strokes / par4Count).toFixed(2) : '–';
  const par5Avg = par5Count > 0 ? (par5Strokes / par5Count).toFixed(2) : '–';

  let bestHole = null, worstHole = null;
  let bestVal = Infinity, worstVal = -Infinity;
  holeData.forEach((hd, i) => {
    if (hd.count < 1) return;
    const avgNet = hd.totalNet / hd.count;
    const avgVsPar = avgNet - HOLES[i].par;
    const vsParStr = (avgVsPar >= 0 ? '+' : '') + avgVsPar.toFixed(2);
    const avgNetStr = avgNet.toFixed(2);
    if (avgVsPar < bestVal) { bestVal = avgVsPar; bestHole = { num: HOLES[i].num, par: HOLES[i].par, avgNet: avgNetStr, avgVsPar: vsParStr }; }
    if (avgVsPar > worstVal) { worstVal = avgVsPar; worstHole = { num: HOLES[i].num, par: HOLES[i].par, avgNet: avgNetStr, avgVsPar: vsParStr }; }
  });

  return {
    rounds: roundCount, avgScore, bestScore, zonesPerRound, avgPenalties,
    birdiesPerRound: fmt1(totalBirdies), bogeysPerRound: fmt1(totalBogeys),
    blowupsPerRound: fmt1(totalBlowups), totalAces,
    par3Avg, par4Avg, par5Avg, bestHole, worstHole,
  };
}

function confirmDeleteProfile(id, name) {
  showModal('🗑️','Delete Player?',`Remove ${name} from saved players? Their historical round data will still be preserved.`,[
    {label:'Cancel',cls:'cancel',action:'closeModal()'},
    {label:'Delete',cls:'danger',action:`doDeleteProfile('${id}')`},
  ]);
}
function doDeleteProfile(id) { closeModal(); deleteProfile(id); renderProfilesScreen(); }

function getSavedRounds() {
  try { return JSON.parse(localStorage.getItem('pz_rounds')||'[]'); } catch { return []; }
}

function showModal(icon,title,msg,actions) {
  document.getElementById('modal-icon').textContent=icon;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-msg').textContent=msg;
  document.getElementById('modal-actions').innerHTML=actions.map(a=>`<button class="modal-btn ${a.cls}" onclick="${a.action}">${a.label}</button>`).join('');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
